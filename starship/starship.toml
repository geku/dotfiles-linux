# Starship Prompt Configuration
# ~/.config/starship.toml

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Newline between prompts
add_newline = true

# Custom format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$nodejs\
$python\
$rust\
$golang\
$java\
$ruby\
$php\
$terraform\
$kubernetes\
$aws\
$gcloud\
$azure\
$cmd_duration\
$line_break\
$character"""

# Right side prompt
right_format = """$time"""

# ============================================
# Core Modules
# ============================================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
format = "[@$hostname](bold yellow) "
disabled = false

[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 🔒"
format = "[$path]($style)[$read_only](red) "

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
show_milliseconds = false

[time]
disabled = false
format = "[$time](dimmed white)"
time_format = "%H:%M"

# ============================================
# Git
# ============================================

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "⚔️ "
ahead = "⬆️ ${count}"
behind = "⬇️ ${count}"
diverged = "⬆️ ${ahead_count}⬇️ ${behind_count}"
untracked = "🆕${count}"
stashed = "📦"
modified = "📝${count}"
staged = "✅${count}"
renamed = "🔄${count}"
deleted = "🗑️ ${count}"

# ============================================
# Docker & Kubernetes
# ============================================

[docker_context]
symbol = "🐳 "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[kubernetes]
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "cyan bold"
disabled = true  # Enable if you use k8s

# ============================================
# Languages & Runtimes (managed by mise)
# ============================================

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
symbol = " "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
detect_files = [".python-version", "requirements.txt", "pyproject.toml", "setup.py"]

[rust]
symbol = "🦀 "
format = "via [$symbol($version )]($style)"
style = "bold red"
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold cyan"
detect_files = ["go.mod", "go.sum", "*.go"]

[java]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "*.java"]

[ruby]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"
detect_files = ["Gemfile", ".ruby-version", "*.rb"]

[php]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold purple"
detect_files = ["composer.json", ".php-version", "*.php"]

# ============================================
# Cloud & Infrastructure
# ============================================

[terraform]
symbol = "💠 "
format = "via [$symbol$workspace]($style) "
style = "bold purple"
detect_files = ["*.tf", "*.tfvars"]

[aws]
symbol = "☁️ "
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = "bold orange"
disabled = true  # Enable if you use AWS

[gcloud]
symbol = "☁️ "
format = 'on [$symbol$account(@$domain)(\($project\))]($style) '
style = "bold blue"
disabled = true  # Enable if you use GCP

[azure]
symbol = "☁️ "
format = "on [$symbol($subscription)]($style) "
style = "bold blue"
disabled = true  # Enable if you use Azure

# ============================================
# Disabled modules (uncomment to enable)
# ============================================

[package]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true
